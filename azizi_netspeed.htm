<%+header%>

<script type="text/javascript">
//<![CDATA[
var RC = {};  // previous bytes: key = chain_ip, value = bytes
var rate_table_combined;

function speed_label(bytes_per_sec) {
    var bits = bytes_per_sec * 8;
    var value = bits / 1024;
    var unit = 'kb/s';
    if (value > 1024) { value /= 1024; unit = 'Mb/s'; }
    return value.toFixed(2) + ' ' + unit;
}

function bytes_label(bytes) {
    var value = bytes / 1024;
    var unit = 'kB';
    if (value > 1024) { value /= 1024; unit = 'MB'; }
    if (value > 1024) { value /= 1024; unit = 'GB'; }
    return value.toFixed(2) + ' ' + unit;
}

function print_table(tbl, RA) {
    var rows = [];
    for (var ip in RA) {
        var data = RA[ip];
        var dl = data.download || 0;
        var ul = data.upload   || 0;
        var total_rate = dl + ul;

        rows.push([
            ip,
            speed_label(dl),
            speed_label(ul),
            speed_label(total_rate),
            bytes_label(data.total_download || 0),
            bytes_label(data.total_upload   || 0),
            total_rate * 8
        ]);
    }

    rows.sort(function(a, b) { return b[6] - a[6]; });
    rows = rows.map(function(r) { return r.slice(0, 6); });

    while (tbl.firstElementChild !== tbl.lastElementChild) {
        tbl.removeChild(tbl.lastElementChild);
    }

    cbi_update_table(tbl, rows, '<em>No active IPs detected yet – generate traffic</em>');
}

window.setTimeout(function() {
    rate_table_combined = document.getElementById('rate_table_combined');

    XHR.poll(3, '<%=build_url("admin/status/realtime/azizi_netspeed_data")%>', null,
        function(x, json) {
            var RA = {};

            // Process upload set
            var up_items = json.up_counters || [];
            for (var i = 0; i < up_items.length; i++) {
                var set_item = up_items[i];
                if (set_item.set && set_item.set.name === 'up_per_ip' && set_item.set.elem) {
                    for (var j = 0; j < set_item.set.elem.length; j++) {
                        var e = set_item.set.elem[j].elem;
                        var ip = e.val;
                        var bytes = e.counter ? e.counter.bytes : 0;

                        var key = 'upload_' + ip;
                        var prev = RC[key] || 0;
                        var rate = (prev > 0) ? (bytes - prev) / 3 : 0;
                        RC[key] = bytes;

                        if (!RA[ip]) RA[ip] = {};
                        RA[ip].upload = rate;
                        RA[ip].total_upload = bytes;
                    }
                }
            }

            // Process download set
            var down_items = json.down_counters || [];
            for (var i = 0; i < down_items.length; i++) {
                var set_item = down_items[i];
                if (set_item.set && set_item.set.name === 'down_per_ip' && set_item.set.elem) {
                    for (var j = 0; j < set_item.set.elem.length; j++) {
                        var e = set_item.set.elem[j].elem;
                        var ip = e.val;
                        var bytes = e.counter ? e.counter.bytes : 0;

                        var key = 'download_' + ip;
                        var prev = RC[key] || 0;
                        var rate = (prev > 0) ? (bytes - prev) / 3 : 0;
                        RC[key] = bytes;

                        if (!RA[ip]) RA[ip] = {};
                        RA[ip].download = rate;
                        RA[ip].total_download = bytes;
                    }
                }
            }

            print_table(rate_table_combined, RA);
        }
    );

    XHR.run();
}, 1000);
//]]>
</script>

<h2>My Realtime Speed</h2>

<div class="cbi-map-descr">
    Shows current upload / download speed and total transferred data per IP address
</div>

<fieldset class="cbi-section">
    <legend>Realtime Per-IP Network Usage</legend>

    <div class="cbi-section-node">
        <div class="table" id="rate_table_combined">
            <div class="tr table-titles">
                <div class="th col-2 hide-xs">IP Address</div>
                <div class="th col-2">Download</div>
                <div class="th col-2">Upload</div>
                <div class="th col-2">Total Rate</div>
                <div class="th col-2">Total Downloaded</div>
                <div class="th col-2">Total Uploaded</div>
            </div>
            <div class="tr placeholder">
                <div class="td" colspan="6"><em>Collecting data... Use internet from different devices</em></div>
            </div>
        </div>
    </div>
</fieldset>

<%+footer%>
